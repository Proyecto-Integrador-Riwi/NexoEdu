# Blueprint de Render para el backend (NexoEdu).
# Render inyecta PORT automáticamente; el resto se completa en el dashboard.
services:
  - type: web
    name: nexoedu-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/test
    envVars:
      - key: USE_LOCAL_DB
        value: "false"
      - key: NODE_ENV
        value: production
      - key: JWT_EXPIRES_IN
        value: 1h
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      # Secretos: se configuran en el dashboard de Render (no en el repo).
      - key: SUPABASE_DB_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
